<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      color: #8888aa;
      text-align: center;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }
    .tools-grid {
      display: grid;
      gap: 1rem;
    }
    .tool-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      background: #141428;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s;
    }
    .tool-card:hover {
      border-color: #ff2d55;
      transform: translateY(-2px);
    }
    .tool-icon {
      font-size: 2rem;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #1e1e3a;
      flex-shrink: 0;
    }
    .tool-info h2 {
      font-size: 1.15rem;
      margin-bottom: 0.3rem;
    }
    .tool-info p {
      color: #8888aa;
      font-size: 0.9rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tools</h1>
    <p class="subtitle">Content creation utilities</p>
    <div class="tools-grid">
      <a href="/tiktok" class="tool-card">
        <div class="tool-icon">T</div>
        <div class="tool-info">
          <h2>TikTok Slideshow Maker</h2>
          <p>Scrape TikTok posts, extract captions via OCR, remix onto your own images, and export ready-to-post PNGs.</p>
        </div>
      </a>
      <a href="/video" class="tool-card">
        <div class="tool-icon">V</div>
        <div class="tool-info">
          <h2>Video Caption Generator</h2>
          <p>Upload videos, add multi-line captions, and batch-generate all combinations with styled text overlays.</p>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
